# ============================================================
#  TRAITS
# ============================================================

traits:
  max_per_player: 5
  edit_cooldown_days: 14
  negative_bonus_lumens: 50   # awarded per negative trait, up to 100 total

  # ── Definitions ──────────────────────────────────────────────────────────────
  # Each trait has:
  #   display       — shown to player
  #   category      — grouping only
  #   is_negative   — grants starting lumen bonus
  #   decay_mults   — multipliers applied to need decay rates in engine
  #   xp_mult       — global skill XP multiplier
  #   need_bonus    — flat need gains on relevant actions (applied by action handlers)
  #   vibe_triggers — conditions that auto-fire vibes (checked in trait vibe engine)
  #   hour_window   — XP/decay active window (for night_owl / morning_person)

  definitions:

    # ── POSITIVE ──────────────────────────────────────────────
    talkative:
      display: "Talkative"
      category: social_emotional
      is_negative: false
      decay_mults: { social: 0.85 }
      vibe_triggers:
        - { condition: social_above_70, vibe_key: social_butterfly, is_negative: false }
        - { condition: social_below_30, vibe_key: going_quiet, is_negative: true }

    bookworm:
      display: "Bookworm"
      category: mind_personality
      is_negative: false
      xp_mult: { knowledge: 1.15 }
      vibe_triggers:
        - { condition: knowledge_xp_today_above_50, vibe_key: deep_focus, is_negative: false }

    creative_soul:
      display: "Creative Soul"
      category: mind_personality
      is_negative: false
      xp_mult: { creativity: 1.15 }
      decay_mults: { fun: 0.90 }
      vibe_triggers:
        - { condition: fun_above_75, vibe_key: inspired, is_negative: false }

    athletic:
      display: "Athletic"
      category: body_physical
      is_negative: false
      xp_mult: { fitness: 1.20 }
      decay_mults: { energy: 0.90 }
      vibe_triggers:
        - { condition: fitness_xp_today_above_30, vibe_key: in_the_zone, is_negative: false }

    iron_stomach:
      display: "Iron Stomach"
      category: body_physical
      is_negative: false
      decay_mults: { hunger: 0.85 }
      need_bonus: { hunger: 5 }     # extra +5 on every meal

    extrovert:
      display: "Extrovert"
      category: social_emotional
      is_negative: false
      decay_mults: { social: 0.80, fun: 0.90 }
      vibe_triggers:
        - { condition: nearby_players_above_0, vibe_key: lit_up, is_negative: false }
        - { condition: no_proximity_24h, vibe_key: cabin_fever, is_negative: true }

    empath:
      display: "Empath"
      category: social_emotional
      is_negative: false
      decay_mults: { purpose: 0.90 }
      vibe_triggers:
        - { condition: purpose_above_70, vibe_key: connected, is_negative: false }
        - { condition: purpose_below_30, vibe_key: overwhelmed, is_negative: true }

    ambitious:
      display: "Ambitious"
      category: work_drive
      is_negative: false
      xp_mult: { all: 1.05 }
      vibe_triggers:
        - { condition: worked_today, vibe_key: in_my_element, is_negative: false }
        - { condition: no_work_3_days, vibe_key: restless, is_negative: true }

    resilient:
      display: "Resilient"
