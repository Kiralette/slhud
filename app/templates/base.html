<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SL HUD{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Exact same variables as simulator ── */
    :root {
      --bg: #faf9f7; --bg2: #f4f2ee; --bg3: #ede9e3; --bg4: #e4e0d8;
      --ink: #1c1814; --ink2: #4a4540; --ink3: #8c8580; --ink4: #b8b3ad;
      --gold: #9a7c4e; --gold2: #c4a265; --gold-light: #f5ede0;
      --green: #4a7c5f; --green-light: #e8f0eb;
      --rose: #9c5050; --rose-light: #f5eaea;
      --amber: #b87c3a; --amber-light: #fdf0dc;
      --border: rgba(28,24,20,0.08); --border2: rgba(28,24,20,0.14);
      --radius: 14px;
      --font: 'Jost', sans-serif;
      --font-head: 'Cormorant Garamond', serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Phone-width constraint — same as simulator's 430px phone shell */
    body {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Status bar (sub-apps) ── */
    .base-status-bar {
      padding: 14px 22px 6px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .base-status-time {
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      font-size: 17px; font-weight: 600; letter-spacing: -0.3px; color: var(--ink);
    }
    .base-status-icons { display: flex; gap: 5px; align-items: center; }
    .base-signal-bars { display: flex; align-items: flex-end; gap: 1.5px; height: 12px; }
    .base-signal-bar { width: 3px; border-radius: 1px; background: var(--ink); }
    .base-signal-bar:nth-child(1) { height: 4px; }
    .base-signal-bar:nth-child(2) { height: 6px; }
    .base-signal-bar:nth-child(3) { height: 9px; }
    .base-signal-bar:nth-child(4) { height: 12px; }
    .base-wifi { font-size: 12px; color: var(--ink); font-weight: 500; }
    .base-battery-wrap { display: flex; align-items: center; gap: 1px; }
    .base-battery-body { width: 22px; height: 11px; border: 1.5px solid var(--ink); border-radius: 3px; padding: 1.5px; }
    .base-battery-fill { height: 100%; width: 75%; background: var(--ink); border-radius: 1px; }
    .base-battery-tip { width: 2px; height: 5px; background: var(--ink); border-radius: 0 1px 1px 0; }

    /* ── App topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,249,247,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 11px 18px;
      display: flex; align-items: flex-end; justify-content: space-between;
    }
    .topbar-left {}
    .topbar-eyebrow {
      font-size: 9px; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--ink4); margin-bottom: 1px;
    }
    .topbar-title {
      font-family: var(--font-head);
      font-size: 21px; font-weight: 400;
      color: var(--ink); line-height: 1;
    }
    .topbar-lumen {
      font-size: 12px; font-weight: 500;
      color: var(--gold); letter-spacing: 0.02em;
      text-align: right; padding-bottom: 2px;
    }
    .topbar-lumen span { font-size: 9px; color: var(--ink4); display: block; text-align: right; letter-spacing: 0.06em; text-transform: uppercase; }

    /* ── Tab bar ── */
    .tab-bar {
      position: sticky; top: 57px; z-index: 90;
      display: flex; border-bottom: 0.5px solid var(--border);
      background: var(--bg);
    }
    .tab {
      flex: 1; padding: 10px 0; font-size: 11px; font-weight: 500;
      text-align: center; color: var(--ink3);
      border: none; background: none; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -0.5px;
      font-family: var(--font); letter-spacing: 0.08em; text-transform: uppercase;
      transition: color .15s;
    }
    .tab.active { color: var(--ink); border-bottom-color: var(--ink); }

    /* ── Tab panels ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Dock (sub-apps) — same as simulator ── */
    .nav-bar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(250,249,247,0.95);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid rgba(28,24,20,0.12);
      border-radius: 24px; padding: 8px 14px;
      display: flex; gap: 14px; align-items: center;
      box-shadow: 0 4px 24px rgba(28,24,20,0.12);
      z-index: 300;
    }
    .nav-dock-icon {
      width: 44px; height: 44px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; text-decoration: none;
      box-shadow: 0 2px 8px rgba(28,24,20,0.10);
      -webkit-tap-highlight-color: transparent;
      transition: transform .1s; position: relative;
    }
    .nav-dock-icon:active { transform: scale(0.93); }
    .nav-dock-dot {
      position: absolute; top: -2px; right: -2px;
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--rose); border: 1.5px solid var(--bg);
      display: none;
    }
    .nav-dock-dot.show { display: block; }

    /* ── Scroll padding so content clears the dock ── */
    .scroll-pad { height: 100px; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: var(--bg);
      padding: 10px 20px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
      opacity: 0; transition: opacity .3s;
      z-index: 9999; white-space: nowrap; pointer-events: none;
    }
    #toast.show { opacity: 1; }

    /* ── Need bar ── */
    .need-bar-wrap {
      padding: 13px 18px;
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
    }
    .need-bar-track {
      height: 4px; background: var(--bg4); border-radius: 99px; overflow: hidden;
    }
    .need-bar-fill {
      height: 100%; border-radius: 99px; transition: width .4s ease;
    }
    .need-bar-fill.ok   { background: var(--green); }
    .need-bar-fill.warn { background: var(--amber); }
    .need-bar-fill.crit { background: var(--rose); animation: crit-pulse 1.5s infinite; }
    @keyframes crit-pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Section head ── */
    .section-head { padding: 16px 18px 8px; }
    .section-head-title { font-family: var(--font-head); font-size: 18px; font-style: italic; color: var(--ink); }
    .section-head-sub { font-size: 11px; color: var(--ink3); margin-top: 2px; }

    /* ── Common item styles ── */
    .item-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 18px; border-bottom: 0.5px solid var(--border);
      cursor: pointer; text-decoration: none; color: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: background .1s;
    }
    .item-row:active { background: var(--bg2); }
    .item-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .item-body { flex: 1; min-width: 0; }
    .item-name { font-size: 13px; font-weight: 500; color: var(--ink); }
    .item-sub  { font-size: 11px; color: var(--ink3); margin-top: 1px; }
    .item-meta { font-size: 11px; color: var(--ink3); text-align: right; flex-shrink: 0; }
    .item-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .item-tag  { font-size: 9px; padding: 2px 7px; border-radius: 99px; background: var(--bg3); color: var(--ink3); font-weight: 500; }

    /* ── Action button ── */
    .action-btn {
      display: block; width: calc(100% - 36px); margin: 16px 18px;
      padding: 13px; background: var(--ink); color: var(--bg);
      border: none; border-radius: var(--radius);
      font-family: var(--font); font-size: 13px; font-weight: 500;
      cursor: pointer; text-align: center; text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: opacity .15s;
    }
    .action-btn:active { opacity: .8; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>

  {% block status_bar %}
  <div class="base-status-bar">
    <div class="base-status-time" id="base-status-time">9:41</div>
    <div class="base-status-icons">
      <div class="base-signal-bars">
        <div class="base-signal-bar"></div><div class="base-signal-bar"></div>
        <div class="base-signal-bar"></div><div class="base-signal-bar"></div>
      </div>
      <span class="base-wifi">WiFi</span>
      <div class="base-battery-wrap">
        <div class="base-battery-body"><div class="base-battery-fill"></div></div>
        <div class="base-battery-tip"></div>
      </div>
    </div>
  </div>
  {% endblock %}

  {% block content %}{% endblock %}

  <div id="toast"></div>

  {% block nav_bar %}
  <div class="nav-bar" id="nav-bar">
    <a class="nav-dock-icon" id="nav-home"   style="background:linear-gradient(135deg,#f5ede0,#e8dcc8)" href="#">🏠</a>
    <a class="nav-dock-icon" id="nav-ping"   style="background:linear-gradient(135deg,#e8f0eb,#c8e0d4)" href="#">
      <div class="nav-dock-dot" id="navdot-ping"></div>💬
    </a>
    <a class="nav-dock-icon" id="nav-flare"  style="background:linear-gradient(135deg,#fdf0dc,#f8e4b8)" href="#">
      <div class="nav-dock-dot" id="navdot-flare"></div>✦
    </a>
    <a class="nav-dock-icon" id="nav-canvas" style="background:linear-gradient(135deg,#f5ede0,#ead8c0)" href="#">
      <div class="nav-dock-dot" id="navdot-canvas"></div>🪞
    </a>
  </div>
  {% endblock %}

  <script>
    // Clock for sub-app status bar
    (function() {
      var el = document.getElementById('base-status-time');
      if (!el) return;
      function tick() {
        var now = new Date(), h = now.getHours() % 12 || 12;
        el.textContent = h + ':' + now.getMinutes().toString().padStart(2,'0');
      }
      tick(); setInterval(tick, 30000);
    })();

    // Wire dock links from URL token
    (function() {
      var token = (new URLSearchParams(window.location.search)).get("token") || "";
      var ids   = ["nav-home","nav-ping","nav-flare","nav-canvas"];
      var paths = ["/app/home","/app/ping","/app/flare","/app/canvas"];
      ids.forEach(function(id, i) {
        var el = document.getElementById(id);
        if (el) el.href = paths[i] + (token ? "?token=" + token : "");
      });
      if (token) {
        function pollDots() {
          fetch("/notifications/unread-count", { headers: { "Authorization": "Bearer " + token } })
            .then(function(r) { return r.json(); })
            .then(function(d) {
              var byApp = d.by_app || {};
              ["ping","flare","canvas"].forEach(function(app) {
                var dot = document.getElementById("navdot-" + app);
                if (dot) dot.classList.toggle("show", (byApp[app] || 0) > 0);
              });
            }).catch(function(){});
        }
        pollDots(); setInterval(pollDots, 60000);
      }
    })();

    // Tab switching
    function showTab(id) {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
      var btn = document.querySelector('[data-tab="'+id+'"]');
      var panel = document.getElementById(id);
      if (btn) btn.classList.add('active');
      if (panel) panel.classList.add('active');
    }

    // Toast
    function toast(msg, d) {
      var el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      setTimeout(function() { el.classList.remove('show'); }, d || 3500);
    }

    // Buy item
    async function buyItem(itemKey, token, itemName, price) {
      var btn = event.target;
      var orig = btn.textContent;
      btn.disabled = true; btn.textContent = '···';
      try {
        var res = await fetch('/shop/buy', {
          method: 'POST',
          headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
          body: JSON.stringify({item_key: itemKey})
        });
        var data = await res.json();
        if (res.ok) {
          toast(price === 0 ? itemName+' — collected' : itemName+' — ✦'+price+' spent');
          setTimeout(function() { location.reload(); }, 1400);
        } else {
          toast(data.detail || 'Could not complete purchase');
          btn.disabled = false; btn.textContent = orig;
        }
      } catch(e) {
        toast('Connection error');
        btn.disabled = false; btn.textContent = orig;
      }
    }
  </script>

  {% block extra_script %}{% endblock %}
</body>
</html>
