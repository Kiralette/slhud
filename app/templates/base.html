<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SL HUD{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ─────────────────────────────
       iPhone Frame (SAFE WRAPPER)
    ───────────────────────────── */
    .device-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e6e3df;
    }

    .iphone {
      width: 390px;
      height: 844px;
      padding: 12px;
      border-radius: 42px;
      background: #111;
      box-shadow:
        0 30px 80px rgba(0,0,0,0.25),
        inset 0 0 0 1px rgba(255,255,255,0.05);
      position: relative;
    }

    .iphone::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 42px;
      background: linear-gradient(
        120deg,
        rgba(255,255,255,0.06),
        transparent 40%
      );
      pointer-events: none;
    }

    .iphone-screen {
      width: 100%;
      height: 100%;
      border-radius: 32px;
      overflow: hidden;
      background: var(--bg);
      position: relative;
    }

    /* override ONLY inside phone */
    .iphone-screen .app-scale {
      transform: none !important;
      width: 100% !important;
    }

    .iphone-screen .nav-bar {
      left: 50% !important;
      transform: translateX(-50%) !important;
    }

    .iphone-screen .dynamic-island {
      left: 50% !important;
      transform: translateX(-50%) scale(.8);
    }

    /* ─────────────────────────────
       YOUR ORIGINAL CSS (unchanged)
    ───────────────────────────── */

    .app-scale {
      transform: scale(1.5);
      transform-origin: top center;
      width: calc(500px/1.5);
      margin: auto;
      position: relative;
    }

    :root {
      --bg: #faf9f7;
      --bg2: #f4f2ee;
      --bg3: #ede9e3;
      --bg4: #e4dfd7;
      --ink: #1c1814;
      --ink2: #4a4540;
      --ink3: #8c8580;
      --ink4: #b8b3ad;
      --gold: #9a7c4e;
      --gold2: #c4a265;
      --gold-light: #f5ede0;
      --green: #4a7c5f;
      --green-light: #e8f0eb;
      --amber: #b8732a;
      --amber-light: #fdf0dc;
      --rose: #9c5050;
      --rose-light: #f5eaea;
      --border: rgba(28,24,20,0.08);
      --border2: rgba(28,24,20,0.14);
      --shadow: 0 1px 3px rgba(28,24,20,0.05),0 4px 16px rgba(28,24,20,0.04);
      --radius: 12px;
      --radius-sm: 7px;
      --font: 'Jost', sans-serif;
      --font-head: 'Cormorant Garamond', serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html {
      font-size: 16px;
    }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* KEEP EVERYTHING ELSE EXACTLY AS YOU HAD IT */
    /* (I did not modify your components below) */

    {% block extra_style %}{% endblock %}
  </style>
</head>

<body>

  <div class="device-wrap">
    <div class="iphone">
      <div class="iphone-screen">

        <!-- ORIGINAL CONTENT START -->
        <div class="dynamic-island">
          <div class="di-sensor"></div>
          <div class="di-camera"></div>
        </div>

        <div class="app-scale">

          {% block status_bar %}
          <div class="base-status-bar">
            <div class="base-status-time" id="base-status-time">9:41</div>
            <div class="base-status-icons">
              <div class="base-signal-bars">
                <div class="base-signal-bar"></div><div class="base-signal-bar"></div>
                <div class="base-signal-bar"></div><div class="base-signal-bar"></div>
              </div>
              <span class="base-wifi">WiFi</span>
              <div class="base-battery-wrap">
                <div class="base-battery-body"><div class="base-battery-fill"></div></div>
                <div class="base-battery-tip"></div>
              </div>
            </div>
          </div>
          {% endblock %}

          {% block content %}{% endblock %}

          {% block extra_script %}{% endblock %}
        </div>

        <div id="toast"></div>

        {% block nav_bar %}
        <div class="nav-bar" id="nav-bar">
          <a class="nav-dock-icon" id="nav-home" href="#">🏠</a>
          <a class="nav-dock-icon" id="nav-ping" href="#">💬</a>
          <a class="nav-dock-icon" id="nav-flare" href="#">✦</a>
          <a class="nav-dock-icon" id="nav-canvas" href="#">🪞</a>
        </div>
        {% endblock %}
        <!-- ORIGINAL CONTENT END -->

      </div>
    </div>
  </div>

</body>
</html>
