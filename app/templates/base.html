<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SL HUD{% endblock %}</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:          #faf9f7;
      --bg2:         #f4f2ee;
      --bg3:         #ede9e3;
      --bg4:         #e4dfd7;
      --ink:         #1c1814;
      --ink2:        #4a4540;
      --ink3:        #8c8580;
      --ink4:        #b8b3ad;
      --gold:        #9a7c4e;
      --gold2:       #c4a265;
      --gold-light:  #f5ede0;
      --green:       #4a7c5f;
      --green-light: #e8f0eb;
      --amber:       #b8732a;
      --amber-light: #fdf0dc;
      --rose:        #9c5050;
      --rose-light:  #f5eaea;
      --border:      rgba(28,24,20,0.08);
      --border2:     rgba(28,24,20,0.14);
      --shadow:      0 1px 3px rgba(28,24,20,0.05),0 4px 16px rgba(28,24,20,0.04);
      --radius:      12px;
      --radius-sm:   7px;
      --font:        'Jost', sans-serif;
      --font-head:   'Cormorant Garamond', serif;

      /* ✅ GLOBAL UI SCALE CONTROL */
      --ui-scale: 1.15;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      font-size: 16px;
    }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body {
      width: min(520px, 100%);
      margin: 0 auto;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ✅ GLOBAL SCALE WRAPPER */
    .app-scale {
      transform: scale(var(--ui-scale));
      transform-origin: top center;
      width: calc(100% / var(--ui-scale));
    }

    /* ── Status bar ── */
    .base-status-bar {
      padding: 14px 22px 6px;
      display: flex; justify-content: space-between; align-items: center;
    }

    .base-status-time {
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      font-size: 17px; font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--ink);
    }

    .base-status-icons { display: flex; gap: 5px; align-items: center; }
    .base-signal-bars { display: flex; align-items: flex-end; gap: 1.5px; height: 12px; }
    .base-signal-bar { width: 3px; border-radius: 1px; background: var(--ink); }
    .base-signal-bar:nth-child(1) { height: 4px; }
    .base-signal-bar:nth-child(2) { height: 6px; }
    .base-signal-bar:nth-child(3) { height: 9px; }
    .base-signal-bar:nth-child(4) { height: 12px; }

    .base-wifi { font-size: 12px; color: var(--ink); font-weight: 500; }

    .base-battery-wrap { display: flex; align-items: center; gap: 1px; }
    .base-battery-body {
      width: 22px; height: 11px;
      border: 1.5px solid var(--ink);
      border-radius: 3px;
      padding: 1.5px;
    }
    .base-battery-fill { height: 100%; width: 75%; background: var(--ink); border-radius: 1px; }
    .base-battery-tip { width: 2px; height: 5px; background: var(--ink); border-radius: 0 1px 1px 0; }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,249,247,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 11px 18px;
      display: flex; justify-content: space-between; align-items: flex-end;
    }

    .topbar-title {
      font-family: var(--font-head);
      font-size: 21px;
      color: var(--ink);
    }

    /* ── Nav dock ── */
    .nav-bar {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(250,249,247,0.98);
      border: 0.5px solid rgba(28,24,20,0.12);
      border-radius: 24px;
      padding: 8px 14px;
      display: flex;
      gap: 14px;
      box-shadow: 0 4px 24px rgba(28,24,20,0.12);
      z-index: 300;
    }

    .nav-dock-icon {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 11px;
      font-size: 20px;
      text-decoration: none;
      position: relative;
    }

    .nav-dock-dot {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--rose);
      border: 1.5px solid var(--bg);
      display: none;
    }

    .nav-dock-dot.show { display: block; }

    {% block extra_style %}{% endblock %}
  </style>
</head>

<body>

  <!-- ✅ EVERYTHING SCALE WRAPPED -->
  <div class="app-scale">

    {% block status_bar %}
    <div class="base-status-bar">
      <div class="base-status-time" id="base-status-time">9:41</div>

      <div class="base-status-icons">
        <div class="base-signal-bars">
          <div class="base-signal-bar"></div>
          <div class="base-signal-bar"></div>
          <div class="base-signal-bar"></div>
          <div class="base-signal-bar"></div>
        </div>
        <span class="base-wifi">WiFi</span>
        <div class="base-battery-wrap">
          <div class="base-battery-body"><div class="base-battery-fill"></div></div>
          <div class="base-battery-tip"></div>
        </div>
      </div>
    </div>
    {% endblock %}

    {% block content %}{% endblock %}

    <div id="toast"></div>

    {% block nav_bar %}
    <div class="nav-bar">
      <a class="nav-dock-icon" href="#">🏠</a>
      <a class="nav-dock-icon" href="#">💬</a>
      <a class="nav-dock-icon" href="#">✦</a>
      <a class="nav-dock-icon" href="#">🪞</a>
    </div>
    {% endblock %}

  </div>

</body>
</html>
