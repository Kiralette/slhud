<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SL HUD{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Phone shell ── */
    html, body {
      background: transparent !important;
      margin: 0; padding: 0;
      width: 320px;
      height: 589px;
      overflow: hidden;
    }

    .phone-shell {
      position: relative;
      width: 320px;
      height: 589px;
      margin: 0;
      background: var(--bg);
      border-radius: 44px;
      box-shadow:
        0 0 0 2px #555,
        0 0 0 4px #222,
        0 0 0 6px #444;
      overflow: hidden;
    }

    /* Volume buttons left */
    .phone-shell::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 90px;
      width: 4px;
      height: 28px;
      background: #444;
      border-radius: 2px 0 0 2px;
      box-shadow: 0 40px 0 #444, 0 76px 0 #444;
    }
    /* Power button right */
    .phone-shell::after {
      content: '';
      position: absolute;
      right: -5px;
      top: 120px;
      width: 4px;
      height: 56px;
      background: #444;
      border-radius: 0 2px 2px 0;
    }

    .app-scale {
      transform: none;
      width: 100%;
      height: 589px;
      margin: 0;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
    }
    .app-scale::-webkit-scrollbar { display: none; }
    :root {
      --bg:          #faf9f7;
      --bg2:         #f4f2ee;
      --bg3:         #ede9e3;
      --bg4:         #e4dfd7;
      --ink:         #1c1814;
      --ink2:        #4a4540;
      --ink3:        #8c8580;
      --ink4:        #b8b3ad;
      --gold:        #9a7c4e;
      --gold2:       #c4a265;
      --gold-light:  #f5ede0;
      --green:       #4a7c5f;
      --green-light: #e8f0eb;
      --amber:       #b8732a;
      --amber-light: #fdf0dc;
      --rose:        #9c5050;
      --rose-light:  #f5eaea;
      --border:      rgba(28,24,20,0.08);
      --border2:     rgba(28,24,20,0.14);
      --shadow:      0 1px 3px rgba(28,24,20,0.05),0 4px 16px rgba(28,24,20,0.04);
      --radius:      12px;
      --radius-sm:   7px;
      --font:        'Jost', sans-serif;
      --font-head:   'Cormorant Garamond', serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html {
      font-size: 16px;
    }

    html, body {
      color: var(--ink);
      font-family: var(--font);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body {
      margin: 0;
      padding: 0;
      width: 320px;
      height: 589px;
      overflow: hidden;
      position: relative;
      background: transparent !important;
    }

    /* ── Dynamic Island ── */
    .dynamic-island {
      position: absolute;
      top: 10px;
      left: 50%; transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #000;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      box-shadow: 0 0 0 1.5px rgba(0,0,0,0.5);
      z-index: 200;
      scale: .8;
    }
    .di-camera {
      width: 10px; height: 10px; border-radius: 50%;
      background: #1a1a1a; border: 1.5px solid #111; position: relative;
    }
    .di-camera::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 3px; height: 3px; border-radius: 50%; background: #333;
    }
    .di-sensor { width: 28px; height: 7px; border-radius: 4px; background: #111; }

    /* ── Status bar ── */
    .base-status-bar {
      padding: 14px 22px 6px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .base-status-time {
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      font-size: 17px; font-weight: 600; letter-spacing: -0.3px; color: var(--ink);
    }
    .base-status-icons { display: flex; gap: 5px; align-items: center; }
    .base-signal-bars { display: flex; align-items: flex-end; gap: 1.5px; height: 12px; }
    .base-signal-bar { width: 3px; border-radius: 1px; background: var(--ink); }
    .base-signal-bar:nth-child(1) { height: 4px; }
    .base-signal-bar:nth-child(2) { height: 6px; }
    .base-signal-bar:nth-child(3) { height: 9px; }
    .base-signal-bar:nth-child(4) { height: 12px; }
    .base-wifi { font-size: 12px; color: var(--ink); font-weight: 500; }
    .base-battery-wrap { display: flex; align-items: center; gap: 1px; }
    .base-battery-body { width: 22px; height: 11px; border: 1.5px solid var(--ink); border-radius: 3px; padding: 1.5px; }
    .base-battery-fill { height: 100%; width: 75%; background: var(--ink); border-radius: 1px; }
    .base-battery-tip { width: 2px; height: 5px; background: var(--ink); border-radius: 0 1px 1px 0; }

    /* ── Topbar ── */
    .topbar {
      position: relative; top: 0; z-index: 100;
      background: rgba(250,249,247,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 11px 18px;
      display: flex; align-items: flex-end; justify-content: space-between;
    }
    .topbar-left {}
    .topbar-eyebrow { font-size: 9px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink4); margin-bottom: 1px; }
    .topbar-title { font-family: var(--font-head); font-size: 21px; font-weight: 400; color: var(--ink); line-height: 1; }
    .topbar-lumen { font-size: 12px; font-weight: 500; color: var(--gold); letter-spacing: 0.02em; text-align: right; padding-bottom: 2px; }
    .topbar-lumen span { font-size: 9px; color: var(--ink4); display: block; text-align: right; letter-spacing: 0.06em; text-transform: uppercase; }

    /* ── Need bar ── */
    .need-bar-wrap { padding: 13px 18px; background: var(--bg); border-bottom: 0.5px solid var(--border); }
    .need-bar-label { display: flex; justify-content: space-between; margin-bottom: 7px; align-items: center; }
    .need-bar-label .need-name { font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); }
    .need-bar-label .need-val { font-size: 12px; font-weight: 500; color: var(--ink2); }
    .need-bar-track { height: 2px; background: var(--bg4); border-radius: 99px; overflow: hidden; }
    .need-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
    .need-bar-fill.ok   { background: var(--green); }
    .need-bar-fill.warn { background: var(--amber); }
    .need-bar-fill.crit { background: var(--rose); animation: crit-pulse 2s ease infinite; }
    @keyframes crit-pulse { 0%,100%{opacity:1}50%{opacity:.4} }

    /* ── Status pill ── */
    .status-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 500; letter-spacing: 0.04em; padding: 4px 10px; border-radius: 99px; margin-top: 9px; }
    .status-pill.ok   { background: var(--green-light); color: var(--green); }
    .status-pill.warn { background: var(--amber-light); color: var(--amber); }
    .status-pill.crit { background: var(--rose-light);  color: var(--rose); }
    .status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    /* ── Tabs ── */
    .tabs { display: flex; padding: 0 10px; border-bottom: 0.5px solid var(--border); background: var(--bg); position: sticky; top: 57px; z-index: 90; overflow-x: hidden; }
    .tab { padding: 10px 4px 9px; flex: 1; font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink4); cursor: pointer; border: none; background: none; border-bottom: 1.5px solid transparent; margin-bottom: -0.5px; transition: all .2s; text-align: center; font-family: var(--font); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tab.active { color: var(--ink); border-bottom-color: var(--gold); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Section head ── */
    .section-head { padding: 18px 18px 8px; }
    .section-head-title { font-family: var(--font-head); font-size: 19px; font-weight: 400; font-style: italic; color: var(--ink); line-height: 1; }
    .section-head-sub { font-size: 10px; color: var(--ink4); letter-spacing: 0.04em; margin-top: 3px; }

    /* ── Item card ── */
    .item-card { margin: 0 18px 8px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); display: flex; align-items: center; gap: 13px; padding: 13px 14px; box-shadow: var(--shadow); transition: all .15s ease; }
    .item-card:active { background: var(--bg2); transform: scale(.99); }
    .item-emoji { font-size: 28px; width: 40px; text-align: center; flex-shrink: 0; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 2px; }
    .item-desc { font-size: 11px; color: var(--ink3); line-height: 1.4; }
    .item-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .item-tag { font-size: 9px; padding: 2px 7px; border-radius: 99px; font-weight: 500; letter-spacing: 0.03em; background: var(--bg3); color: var(--ink3); }
    .item-tag.ok     { background: var(--green-light); color: var(--green); }
    .item-tag.hunger { background: var(--amber-light); color: var(--amber); }
    .item-tag.vibe   { background: var(--gold-light);  color: var(--gold); }
    .item-tag.thirst { background: #e8f0f5; color: #3a6a8c; }
    .item-right { text-align: right; flex-shrink: 0; }
    .item-price { font-size: 14px; font-weight: 600; color: var(--ink2); }
    .item-price .sym { color: var(--gold); }
    .item-price.free { color: var(--green); font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
    .item-btn { display: inline-block; margin-top: 7px; background: var(--ink); color: var(--bg); border: none; border-radius: 99px; padding: 5px 14px; font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; font-family: var(--font); transition: background .15s; }
    .item-btn:active { background: var(--ink2); }
    .item-btn:disabled { background: var(--ink4); cursor: not-allowed; }
    .item-btn.free-btn { background: var(--green-light); color: var(--green); }

    /* ── Specials strip ── */
    .specials-strip { display: flex; gap: 10px; overflow-x: auto; padding: 4px 18px 14px; scrollbar-width: none; }
    .specials-strip::-webkit-scrollbar { display: none; }
    .special-card { flex-shrink: 0; width: 136px; background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 14px 12px; text-align: center; box-shadow: var(--shadow); transition: all .15s; }
    .special-card:active { transform: scale(.97); }
    .special-badge { display: inline-block; font-size: 8px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); border: 0.5px solid var(--gold2); border-radius: 99px; padding: 2px 8px; margin-bottom: 8px; }
    .special-card-emoji { font-size: 28px; margin-bottom: 7px; }
    .special-card-name { font-size: 11px; font-weight: 500; color: var(--ink); margin-bottom: 4px; line-height: 1.3; }
    .special-card-price { font-size: 12px; font-weight: 600; color: var(--ink2); }
    .special-card-was { font-size: 10px; color: var(--ink4); text-decoration: line-through; margin-right: 2px; }
    .special-card-btn { margin-top: 10px; width: 100%; background: var(--ink); color: var(--bg); border: none; border-radius: 99px; padding: 6px 0; font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; font-family: var(--font); }
    .special-card-btn:active { background: var(--ink2); }

    /* ── Category chips ── */
    .chips-row { display: flex; padding: 8px 18px; overflow-x: auto; scrollbar-width: none; gap: 6px; }
    .chips-row::-webkit-scrollbar { display: none; }
    .category-chip { display: inline-block; font-size: 10px; font-weight: 500; letter-spacing: 0.05em; padding: 5px 14px; border-radius: 99px; border: 0.5px solid var(--border2); color: var(--ink3); cursor: pointer; transition: all .15s; white-space: nowrap; background: var(--bg); }
    .category-chip.active { background: var(--ink); border-color: var(--ink); color: var(--bg); }

    /* ── Log entries ── */
    .log-entry { display: flex; align-items: center; gap: 12px; padding: 11px 18px; border-bottom: 0.5px solid var(--border); }
    .log-entry:last-child { border-bottom: none; }
    .log-delta { font-size: 12px; font-weight: 600; min-width: 42px; }
    .log-delta.pos { color: var(--green); }
    .log-delta.neg { color: var(--rose); }
    .log-text { flex: 1; font-size: 11px; color: var(--ink2); }
    .log-meta { font-size: 11px; color: var(--ink3); }
    .log-time { font-size: 10px; color: var(--ink4); }

    /* ── Info / vendor cards ── */
    .info-card { margin: 0 18px 10px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 13px 15px; }
    .info-card p { font-size: 11px; color: var(--ink2); line-height: 1.8; }
    .vendor-card { margin: 0 18px 10px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 13px 15px; display: flex; gap: 12px; align-items: flex-start; box-shadow: var(--shadow); }
    .vendor-icon { font-size: 24px; }
    .vendor-name { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 2px; }
    .vendor-meta { font-size: 11px; color: var(--ink3); }
    .vendor-note { font-size: 10px; color: var(--ink4); margin-top: 3px; }

    /* ── Empty states ── */
    .empty-state, .empty { padding: 52px 18px; text-align: center; }
    .empty-icon { font-size: 30px; margin-bottom: 12px; opacity: 0.35; }
    .empty-title { font-family: var(--font-head); font-size: 18px; font-style: italic; color: var(--ink2); margin-bottom: 5px; }
    .empty-sub, .empty-text { font-size: 12px; color: var(--ink4); line-height: 1.7; }

    /* ── Toast ── */
    #toast {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-90px);
      background: var(--ink); color: var(--bg);
      padding: 10px 22px; border-radius: 99px;
      font-size: 12px; font-weight: 500; letter-spacing: 0.02em;
      z-index: 999; transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none; white-space: nowrap;
      box-shadow: 0 6px 28px rgba(28,24,20,0.18);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .scroll-pad { height: 110px; }
    .divider { height: 0.5px; background: var(--border); margin: 4px 18px; }

    /* ── Dock (sticky so SL browser click targets align correctly) ── */
    .nav-bar {
  position: sticky;
  bottom: 16px;
  left: 0;
  right: 0;
  width: fit-content;
  margin: 0 auto;
  background: rgba(250,249,247,0.98);
  border: 0.5px solid rgba(28,24,20,0.12);
  border-radius: 24px;
  padding: 8px 14px;
  display: flex;
  gap: 14px;
  align-items: center;
  box-shadow: 0 4px 24px rgba(28,24,20,0.12);
  z-index: 300;
    }
    .nav-dock-icon {
      width: 44px; height: 44px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; text-decoration: none;
      box-shadow: 0 2px 8px rgba(28,24,20,0.10);
      transition: transform .1s; position: relative;
    }
    .nav-dock-icon:active { transform: scale(0.93); }
    .nav-dock-dot {
      position: absolute; top: -2px; right: -2px;
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--rose); border: 1.5px solid var(--bg);
      display: none;
    }
    .nav-dock-dot.show { display: block; }

    /* ── Stagger animation ── */
    .stagger > * { animation: fadeUp .3s ease both; }
    .stagger > *:nth-child(1){animation-delay:.03s}
    .stagger > *:nth-child(2){animation-delay:.07s}
    .stagger > *:nth-child(3){animation-delay:.11s}
    .stagger > *:nth-child(4){animation-delay:.15s}
    .stagger > *:nth-child(5){animation-delay:.19s}
    .stagger > *:nth-child(6){animation-delay:.23s}
    .stagger > *:nth-child(7){animation-delay:.27s}
    .stagger > *:nth-child(8){animation-delay:.31s}
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
<div class="phone-shell">
 <div class="dynamic-island">
   <div class="di-sensor"></div>
   <div class="di-camera"></div>
 </div>
 <div class="app-scale">
  {% block status_bar %}
  <div class="base-status-bar">
    <div class="base-status-time" id="base-status-time">9:41</div>
    <div class="base-status-icons">
      <div class="base-signal-bars">
        <div class="base-signal-bar"></div><div class="base-signal-bar"></div>
        <div class="base-signal-bar"></div><div class="base-signal-bar"></div>
      </div>
      <span class="base-wifi">WiFi</span>
      <div class="base-battery-wrap">
        <div class="base-battery-body"><div class="base-battery-fill"></div></div>
        <div class="base-battery-tip"></div>
      </div>
    </div>
  </div>
  {% endblock %}

  {% block content %}{% endblock %}

  <script>
    // Clock
    (function() {
      var el = document.getElementById('base-status-time');
      if (!el) return;
      function tick() {
        var now = new Date(), h = now.getHours() % 12 || 12;
        el.textContent = h + ':' + now.getMinutes().toString().padStart(2,'0');
      }
      tick(); setInterval(tick, 30000);
    })();



    // Tab switching
    function showTab(id) {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
      var btn = document.querySelector('[data-tab="'+id+'"]');
      var panel = document.getElementById(id);
      if (btn) btn.classList.add('active');
      if (panel) panel.classList.add('active');
    }

    // Toast
    function toast(msg, d) {
      var el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      setTimeout(function() { el.classList.remove('show'); }, d || 3500);
    }

    // Buy item
    async function buyItem(itemKey, token, itemName, price) {
      var btn = event.target, orig = btn.textContent;
      btn.disabled = true; btn.textContent = '···';
      try {
        var res = await fetch('/shop/buy', {
          method: 'POST',
          headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
          body: JSON.stringify({item_key: itemKey})
        });
        var data = await res.json();
        if (res.ok) {
          toast(price === 0 ? itemName+' — collected' : itemName+' — ✦'+price+' spent');
          setTimeout(function() { location.reload(); }, 1400);
        } else {
          toast(data.detail || 'Could not complete purchase');
          btn.disabled = false; btn.textContent = orig;
        }
      } catch(e) {
        toast('Connection error');
        btn.disabled = false; btn.textContent = orig;
      }
    }
  </script>

  {% block extra_script %}{% endblock %}
 </div>

  <div id="toast"></div>

  {% block nav_bar %}
  <div class="nav-bar" id="nav-bar">
    <a class="nav-dock-icon" id="nav-home"   style="background:linear-gradient(135deg,#f5ede0,#e8dcc8)" href="#">🏠</a>
    <a class="nav-dock-icon" id="nav-ping"   style="background:linear-gradient(135deg,#e8f0eb,#c8e0d4)" href="#">
      <div class="nav-dock-dot" id="navdot-ping"></div>💬
    </a>
    <a class="nav-dock-icon" id="nav-flare"  style="background:linear-gradient(135deg,#fdf0dc,#f8e4b8)" href="#">
      <div class="nav-dock-dot" id="navdot-flare"></div>✦
    </a>
    <a class="nav-dock-icon" id="nav-canvas" style="background:linear-gradient(135deg,#f5ede0,#ead8c0)" href="#">
      <div class="nav-dock-dot" id="navdot-canvas"></div>🪞
    </a>
  </div>
  {% endblock %}

  <script>
    // Wire dock token from URL
    (function() {
      var token = (new URLSearchParams(window.location.search)).get("token") || "";
      var ids   = ["nav-home","nav-ping","nav-flare","nav-canvas"];
      var paths = ["/app/home","/app/ping","/app/flare","/app/canvas"];
      ids.forEach(function(id, i) {
        var el = document.getElementById(id);
        if (el) el.href = paths[i] + (token ? "?token=" + token : "");
      });
      if (token) {
        function pollDots() {
          fetch("/notifications/unread-count", { headers: { "Authorization": "Bearer " + token } })
            .then(function(r) { return r.json(); })
            .then(function(d) {
              var byApp = d.by_app || {};
              ["ping","flare","canvas"].forEach(function(app) {
                var dot = document.getElementById("navdot-" + app);
                if (dot) dot.classList.toggle("show", (byApp[app] || 0) > 0);
              });
            }).catch(function(){});
        }
        pollDots(); setInterval(pollDots, 60000);
      }
    })();
  </script>
</div><!-- /phone-shell -->
</body>
</html>
