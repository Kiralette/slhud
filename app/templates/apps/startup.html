<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yours Truly</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    video {
      /* fill the viewport while preserving aspect ratio */
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Fade-out overlay — triggered by JS just before redirect */
    #fade {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #fade.out { opacity: 1; }
  </style>
</head>
<body>
  <div id="splash">
    <video
      id="vid"
      src="https://pub-faf7c92e7a064d998d176a633eee64a2.r2.dev/startup.mp4"
      autoplay
      playsinline
      muted
      preload="auto"
    ></video>
  </div>

  <div id="fade"></div>

  <script>
    const token   = {{ token | tojson }};
    const dest    = "/app/home?token=" + encodeURIComponent(token);
    const vid     = document.getElementById("vid");
    const fade    = document.getElementById("fade");

    function goHome() {
      fade.classList.add("out");
      setTimeout(() => { window.location.href = dest; }, 650);
    }

    vid.addEventListener("ended", goHome);

    // Safety net: if video never loads or stalls, redirect after 8s
    const fallback = setTimeout(goHome, 8000);

    vid.addEventListener("ended", () => clearTimeout(fallback));
    vid.addEventListener("error", goHome);
  </script>
</body>
</html>
